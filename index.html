<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchTower Collector Tester</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-soft: #eef3f8;
      --text: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #15803d;
      --warn: #a16207;
      --danger: #b42318;
      --shadow: 0 18px 48px rgba(17, 24, 39, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(246, 247, 251, 0.95)),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 760;
    }

    .subtle {
      color: var(--muted);
      margin: 8px 0 0;
      max-width: 700px;
      font-size: 15px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warn);
    }

    .status.ready .status-dot {
      background: var(--success);
    }

    .status.paused .status-dot {
      background: var(--warn);
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 17px;
      line-height: 1.2;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      background: #fff;
      font: inherit;
      font-size: 14px;
    }

    input:focus {
      border-color: var(--primary);
      outline: 3px solid rgba(37, 99, 235, 0.16);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0 0;
      color: #344054;
      font-size: 14px;
      line-height: 1.4;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: #b8c2d3;
      background: #f8fafc;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    button.danger {
      border-color: #f4b6b0;
      color: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .full {
      grid-column: 1 / -1;
    }

    .result-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .metric {
      padding: 14px 16px;
      border-right: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .log-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .log-toolbar h2 {
      margin: 0;
    }

    #log {
      height: 530px;
      overflow: auto;
      margin: 0;
      padding: 0;
      list-style: none;
      background: #0f172a;
      color: #dbeafe;
      font-family: "Cascadia Mono", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .log-entry {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-entry.success {
      color: #bbf7d0;
    }

    .log-entry.warn {
      color: #fde68a;
    }

    .log-entry.error {
      color: #fecaca;
    }

    .log-entry.request {
      color: #bfdbfe;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 24px, 640px);
        padding: 20px 0;
      }

      header {
        display: block;
      }

      header {
        margin-bottom: 16px;
      }

      .status {
        margin-top: 14px;
      }

      section {
        margin-bottom: 16px;
      }

      .actions,
      .result-strip {
        grid-template-columns: 1fr;
      }

      .metric {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .metric:last-child {
        border-bottom: 0;
      }

      #log {
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>WatchTower Collector Tester</h1>
        <p class="subtle">Runs the uploaded collector against the error and performance endpoints, then shows the request path, status code, and response body returned by the backend.</p>
      </div>
      <div id="collectorStatus" class="status">
        <span class="status-dot"></span>
        <span>Collector not initialized</span>
      </div>
    </header>

    <section>
        <div class="result-strip">
          <div class="metric">
            <strong id="requestCount">0</strong>
            <span>requests</span>
          </div>
          <div class="metric">
            <strong id="successCount">0</strong>
            <span>2xx responses</span>
          </div>
          <div class="metric">
            <strong id="failureCount">0</strong>
            <span>errors</span>
          </div>
        </div>

        <div class="panel">
          <h2>Collector Events</h2>
          <label for="apiKeyInput">API key</label>
          <input
            id="apiKeyInput"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="Paste the API key generated by WatchTower">
          <div class="actions">
            <button id="initBtn" class="primary">Load script tag</button>
            <button id="pauseBtn">Pause collector</button>
            <button id="clearBtn">Clear log</button>
            <button id="manualErrorBtn">Manual error</button>
            <button id="runtimeErrorBtn">Runtime error</button>
            <!-- Verifies that unhandled promise rejections are captured by the collector. -->
            <button id="promiseBtn">Promise rejection</button>
            <button id="performanceBtn">Page performance</button>
            <!-- Triggers collector fetch-latency tracking with a large public image. -->
            <button id="fetch10MbBtn">Fetch 12 MB image</button>
            <button id="fetch20MbBtn">Fetch 21 MB image</button>
            <!-- Smoke tests the backend error endpoint without going through collector.js. -->
            <button id="directErrorBtn">Direct error POST</button>
            <!-- Smoke tests the backend performance endpoint without going through collector.js. -->
            <button id="directPerformanceBtn">Direct performance POST</button>
            <button id="reloadBtn" class="danger">Reload page</button>
          </div>
        </div>

        <div class="log-toolbar">
          <h2>Network Log</h2>
          <button id="copyBtn">Copy log</button>
        </div>
        <ol id="log"></ol>
    </section>
  </main>

  <!-- Tester-only config. The backend base URL is hardcoded in collector.js. -->
  <script>
    const WATCHTOWER_CONFIG = {
      apiKey: "7036f2c6350e500150773d8f6cc265e1c87e350f56e9c073fca91405a28169c8",
      release: "1.0.0",
      forceFetchFallback: true,
    };
    const WATCHTOWER_API_KEY_STORAGE_KEY = "watchtowerTesterApiKey";

    const LARGE_IMAGE_TARGETS = {
      image12Mb: {
        label: "12 MB Wikimedia image",
        url: "https://upload.wikimedia.org/wikipedia/commons/d/d3/Be%C5%9Fikta%C5%9F_MB_vs_Mersin_SK_TBSL_20241102_%2814%29.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original",
      },
      image21Mb: {
        label: "21 MB Wikimedia image",
        url: "https://upload.wikimedia.org/wikipedia/commons/0/0e/Fenerbah%C3%A7e_Basketbol_vs_Galatasaray_MB_TBSL_20250517_%2814%29.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original",
      },
    };

    const elements = {
      apiKeyInput: document.getElementById("apiKeyInput"),
      initBtn: document.getElementById("initBtn"),
      pauseBtn: document.getElementById("pauseBtn"),
      clearBtn: document.getElementById("clearBtn"),
      copyBtn: document.getElementById("copyBtn"),
      manualErrorBtn: document.getElementById("manualErrorBtn"),
      runtimeErrorBtn: document.getElementById("runtimeErrorBtn"),
      promiseBtn: document.getElementById("promiseBtn"),
      performanceBtn: document.getElementById("performanceBtn"),
      fetch10MbBtn: document.getElementById("fetch10MbBtn"),
      fetch20MbBtn: document.getElementById("fetch20MbBtn"),
      directErrorBtn: document.getElementById("directErrorBtn"),
      directPerformanceBtn: document.getElementById("directPerformanceBtn"),
      reloadBtn: document.getElementById("reloadBtn"),
      log: document.getElementById("log"),
      collectorStatus: document.getElementById("collectorStatus"),
      requestCount: document.getElementById("requestCount"),
      successCount: document.getElementById("successCount"),
      failureCount: document.getElementById("failureCount"),
    };

    const state = {
      collectorInitialized: false,
      collectorPaused: false,
      bridgeInstalled: false,
      originalFetch: window.fetch.bind(window),
      originalSendBeacon: navigator.sendBeacon ? navigator.sendBeacon.bind(navigator) : null,
      counts: {
        requests: 0,
        successes: 0,
        failures: 0,
      },
    };

    hydrateApiKeyInput();
    elements.pauseBtn.disabled = true;
    setTestButtonsEnabled(false);
    log("info", "Ready. Start the backend, then load the collector script tag.");

    elements.apiKeyInput.addEventListener("input", persistApiKey);
    elements.initBtn.addEventListener("click", initCollector);
    elements.pauseBtn.addEventListener("click", toggleCollectorPause);
    elements.clearBtn.addEventListener("click", clearLog);
    elements.copyBtn.addEventListener("click", copyLog);
    elements.manualErrorBtn.addEventListener("click", () => {
      requireCollector();
      setTimeout(() => {
        throw new Error("Manual WatchTower collector test error");
      }, 0);
    });
    elements.runtimeErrorBtn.addEventListener("click", () => {
      requireCollector();
      setTimeout(() => {
        throw new TypeError("Runtime WatchTower collector test error");
      }, 0);
    });
    elements.promiseBtn.addEventListener("click", () => {
      requireCollector();
      Promise.reject(new ReferenceError("Unhandled WatchTower collector test rejection"));
    });
    elements.performanceBtn.addEventListener("click", () => {
      requireCollector();
      log("info", "Page performance is sent automatically when the collector script loads. Reload the page and click Load script tag again to retest page performance.");
    });
    elements.fetch10MbBtn.addEventListener("click", () => fetchLargeImage(LARGE_IMAGE_TARGETS.image12Mb));
    elements.fetch20MbBtn.addEventListener("click", () => fetchLargeImage(LARGE_IMAGE_TARGETS.image21Mb));
    elements.directErrorBtn.addEventListener("click", () => {
      const apiKey = requireApiKey();
      if (!apiKey) return;

      postDirectEvent("http://localhost:3000/api/events/error", {
        type: "error",
        apiKey,
        message: "Direct tester error endpoint smoke test",
        stack: "Generated by WatchTower tester index.html",
        url: window.location.href,
        errorType: "TesterError",
        severity: "low",
        release: WATCHTOWER_CONFIG.release,
        timestamp: new Date().toISOString(),
      });
    });
    elements.directPerformanceBtn.addEventListener("click", () => {
      const apiKey = requireApiKey();
      if (!apiKey) return;

      postDirectEvent("http://localhost:3000/api/events/performance", {
        type: "performance",
        apiKey,
        url: window.location.href,
        loadTimeMs: 1,
        domContentLoadedMs: 1,
        ttfbMs: 1,
        apiEndpoint: LARGE_IMAGE_TARGETS.image12Mb.url,
        apiLatencyMs: 1,
        memoryMB: null,
        release: WATCHTOWER_CONFIG.release,
        timestamp: new Date().toISOString(),
      });
    });
    elements.reloadBtn.addEventListener("click", () => window.location.reload());

    async function initCollector() {
      if (state.collectorInitialized) {
        log("warn", "Collector script is already loaded. Reload before loading it again to avoid duplicate listeners.");
        return;
      }

      const apiKey = requireApiKey();
      if (!apiKey) return;

      installNetworkBridge();

      elements.initBtn.disabled = true;
      elements.initBtn.textContent = "Loading script tag";

      try {
        await loadCollectorScript();
      } catch (error) {
        elements.initBtn.disabled = false;
        elements.initBtn.textContent = "Load script tag";
        log("error", error.message);
        return;
      }

      state.collectorInitialized = true;
      state.collectorPaused = false;
      elements.initBtn.textContent = "Script tag loaded";
      elements.pauseBtn.disabled = false;
      elements.pauseBtn.textContent = "Pause collector";
      setCollectorStatus("Collector initialized", "ready");
      setTestButtonsEnabled(true);
      log("success", `Collector script tag loaded with release ${WATCHTOWER_CONFIG.release}.`);
    }

    function loadCollectorScript() {
      const existingScript = document.getElementById("collector-script");
      if (existingScript) return Promise.resolve();

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.id = "collector-script";
        script.src = "./collector.js";
        script.dataset.apikey = getApiKey();
        script.dataset.release = WATCHTOWER_CONFIG.release;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error("Collector failed to load. Confirm collector.js exists next to this tester page."));
        document.body.appendChild(script);
      });
    }

    function toggleCollectorPause() {
      requireCollector();
      state.collectorPaused = !state.collectorPaused;
      elements.pauseBtn.textContent = state.collectorPaused ? "Resume collector" : "Pause collector";
      setCollectorStatus(state.collectorPaused ? "Collector paused" : "Collector initialized", state.collectorPaused ? "paused" : "ready");
      log(state.collectorPaused ? "warn" : "success", state.collectorPaused
        ? "Collector traffic paused. Error listeners are still registered, but telemetry sends are swallowed by the tester."
        : "Collector traffic resumed.");
    }

    // Wrap network APIs so this page can display collector requests and responses.
    function installNetworkBridge() {
      if (state.bridgeInstalled) return;

      window.fetch = async (input, init = {}) => {
        const originalUrl = getRequestUrl(input);
        const method = init.method || input?.method || "GET";
        const startedAt = performance.now();
        const telemetryRequest = isTelemetryEndpoint(originalUrl);

        countRequest();
        log("request", `${method.toUpperCase()} ${originalUrl}${init.body ? `\npayload ${previewBody(init.body)}` : ""}`);

        try {
          const response = await state.originalFetch(input, init);
          const elapsedMs = Math.round(performance.now() - startedAt);
          const body = await readResponsePreview(response);
          countResponse(response.ok);
          log(response.ok ? "success" : "error", `${response.status} ${response.statusText || "(no status text)"} in ${elapsedMs}ms\n${body}`);
          return response;
        } catch (error) {
          countResponse(false);
          log("error", `${method.toUpperCase()} ${originalUrl} failed: ${error.message}`);
          if (telemetryRequest) {
            return new Response(JSON.stringify({
              error: error.message,
              swallowedByTester: true,
            }), {
              status: 599,
              statusText: "Telemetry failed",
              headers: { "Content-Type": "application/json" },
            });
          }
          throw error;
        }
      };

      Object.defineProperty(navigator, "sendBeacon", {
        configurable: true,
        value: (url, data) => {
          const finalUrl = String(url);
          const forced = WATCHTOWER_CONFIG.forceFetchFallback;

          if (state.collectorPaused) {
            log("warn", `Collector paused; swallowed BEACON ${finalUrl}${data ? `\npayload ${previewBody(data)}` : ""}`);
            return true;
          }

          log("request", `BEACON ${finalUrl}${forced ? "\nforced to fetch fallback" : ""}${data ? `\npayload ${previewBody(data)}` : ""}`);

          if (forced || !state.originalSendBeacon) {
            return false;
          }

          try {
            const sent = state.originalSendBeacon(finalUrl, data);
            log(sent ? "success" : "warn", sent ? "sendBeacon queued by the browser; no response body is exposed." : "sendBeacon returned false; collector should fall back to fetch.");
            return sent;
          } catch (error) {
            log("error", `sendBeacon failed: ${error.message}`);
            return false;
          }
        },
      });

      state.bridgeInstalled = true;
    }

    async function postDirectEvent(path, payload) {
      installNetworkBridge();
      try {
        await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      } catch (error) {
        log("error", `Direct POST failed: ${error.message}`);
      }
    }

    async function fetchLargeImage(target) {
      requireCollector();
      const url = withCacheBuster(target.url);
      log("info", `Starting ${target.label} fetch.\n${url}`);

      try {
        const response = await fetch(url, { mode: "cors" });
        const blob = await response.blob();
        log(response.ok ? "success" : "error", `${target.label} body read complete: ${response.status} ${response.statusText || "(no status text)"}, ${formatBytes(blob.size)}.`);
      } catch (error) {
        log("error", `${target.label} fetch failed: ${error.message}`);
      }
    }

    function requireCollector() {
      if (!state.collectorInitialized) {
        throw new Error("Initialize the collector before running this test.");
      }
    }

    function requireApiKey() {
      const apiKey = getApiKey();
      if (apiKey) {
        persistApiKey();
        return apiKey;
      }

      log("error", "Enter the generated API key before running this test.");
      elements.apiKeyInput.focus();
      return "";
    }

    function isTelemetryEndpoint(url) {
      if (!url) return false;
      return url.includes("/api/events/error") || url.includes("/api/events/performance");
    }

    function withCacheBuster(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}watchtowerTest=${Date.now()}`;
    }

    function getRequestUrl(input) {
      if (typeof input === "string") return input;
      if (input instanceof URL) return input.href;
      if (input instanceof Request) return input.url;
      return String(input);
    }

    function getApiKey() {
      return elements.apiKeyInput.value.trim();
    }

    function hydrateApiKeyInput() {
      let savedApiKey = "";

      try {
        savedApiKey = localStorage.getItem(WATCHTOWER_API_KEY_STORAGE_KEY) || "";
      } catch (error) {
        log("warn", `Could not read saved API key: ${error.message}`);
      }

      elements.apiKeyInput.value = savedApiKey || WATCHTOWER_CONFIG.apiKey;
    }

    function persistApiKey() {
      try {
        localStorage.setItem(WATCHTOWER_API_KEY_STORAGE_KEY, getApiKey());
      } catch (error) {
        log("warn", `Could not save API key: ${error.message}`);
      }
    }

    function previewBody(body) {
      if (typeof body === "string") return truncate(body, 900);
      if (body instanceof Blob) return `[Blob ${body.type || "unknown type"}, ${body.size} bytes]`;
      if (body instanceof FormData) return "[FormData]";
      return truncate(String(body), 900);
    }

    async function readResponsePreview(response) {
      try {
        const contentType = response.headers.get("Content-Type") || "";
        if (contentType.startsWith("image/")) {
          const blob = await response.clone().blob();
          return `[${contentType}, ${formatBytes(blob.size)} downloaded]`;
        }

        const text = await response.clone().text();
        return text ? truncate(text, 1200) : "(empty response body)";
      } catch (error) {
        return `(could not read response body: ${error.message})`;
      }
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "unknown size";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unitIndex = 0;
      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }
      return `${value.toFixed(unitIndex === 0 ? 0 : 2)} ${units[unitIndex]}`;
    }

    function truncate(value, limit) {
      return value.length > limit ? `${value.slice(0, limit)}...` : value;
    }

    function log(level, message) {
      const entry = document.createElement("li");
      entry.className = `log-entry ${level}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      elements.log.prepend(entry);
    }

    function clearLog() {
      elements.log.replaceChildren();
      state.counts = { requests: 0, successes: 0, failures: 0 };
      updateCounts();
    }

    async function copyLog() {
      const text = Array.from(elements.log.children).map((item) => item.textContent).join("\n\n");
      try {
        await navigator.clipboard.writeText(text);
        log("success", "Log copied to clipboard.");
      } catch (error) {
        log("error", `Could not copy log: ${error.message}`);
      }
    }

    function countRequest() {
      state.counts.requests += 1;
      updateCounts();
    }

    function countResponse(ok) {
      if (ok) {
        state.counts.successes += 1;
      } else {
        state.counts.failures += 1;
      }
      updateCounts();
    }

    function updateCounts() {
      elements.requestCount.textContent = state.counts.requests;
      elements.successCount.textContent = state.counts.successes;
      elements.failureCount.textContent = state.counts.failures;
    }

    function setCollectorStatus(message, mode) {
      elements.collectorStatus.classList.toggle("ready", mode === "ready");
      elements.collectorStatus.classList.toggle("paused", mode === "paused");
      elements.collectorStatus.querySelector("span:last-child").textContent = message;
    }

    function setTestButtonsEnabled(enabled) {
      [
        elements.manualErrorBtn,
        elements.runtimeErrorBtn,
        elements.promiseBtn,
        elements.performanceBtn,
        elements.fetch10MbBtn,
        elements.fetch20MbBtn,
      ].forEach((button) => {
        button.disabled = !enabled;
      });
    }
  </script>
</body>
</html>
