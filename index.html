<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchTower Collector Tester</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #15803d;
      --warn: #a16207;
      --danger: #b42318;
      --shadow: 0 18px 48px rgba(17, 24, 39, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(246, 247, 251, 0.95)),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 760;
    }

    .subtle {
      color: var(--muted);
      margin: 8px 0 0;
      max-width: 700px;
      font-size: 15px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warn);
    }

    .status.ready .status-dot {
      background: var(--success);
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 17px;
      line-height: 1.2;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      background: #fff;
      font: inherit;
      font-size: 14px;
    }

    input:focus {
      border-color: var(--primary);
      outline: 3px solid rgba(37, 99, 235, 0.16);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: #b8c2d3;
      background: #f8fafc;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    button.danger {
      border-color: #f4b6b0;
      background: #fff;
      color: var(--danger);
    }

    button.danger:hover {
      border-color: #e8948c;
      background: #fff5f5;
      color: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .log-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
    }

    .log-toolbar h2 {
      margin: 0;
    }

    #log {
      height: 530px;
      overflow: auto;
      margin: 0;
      padding: 0;
      list-style: none;
      background: #0f172a;
      color: #dbeafe;
      font-family: "Cascadia Mono", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      border-radius: 0 0 8px 8px;
    }

    .log-entry {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-entry.success { color: #bbf7d0; }
    .log-entry.warn    { color: #fde68a; }
    .log-entry.error   { color: #fecaca; }
    .log-entry.request { color: #bfdbfe; }

    @media (max-width: 820px) {
      main {
        width: min(100% - 24px, 640px);
        padding: 20px 0;
      }

      header {
        display: block;
        margin-bottom: 16px;
      }

      .status {
        margin-top: 14px;
      }

      section {
        margin-bottom: 16px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      #log {
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>WatchTower Collector Tester</h1>
        <p class="subtle">Runs the uploaded collector against the error and performance endpoints, then shows the request path, status code, and response body returned by the backend.</p>
      </div>
      <div id="collectorStatus" class="status">
        <span class="status-dot"></span>
        <span>Collector not initialized</span>
      </div>
    </header>

    <section>
      <div class="panel">
        <h2>Collector Events</h2>
        <label for="apiKeyInput">API key</label>
        <input
          id="apiKeyInput"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Paste the API key generated by WatchTower">
        <div class="actions">
          <button id="initBtn" class="primary">Load script tag</button>
          <button id="manualErrorBtn">Manual error</button>
          <button id="runtimeErrorBtn">Runtime error</button>
          <!-- Verifies that unhandled promise rejections are captured by the collector. -->
          <button id="promiseBtn">Promise rejection</button>
          <!-- Logs a reminder that page performance fires automatically on collector load. -->
          <button id="performanceBtn">Page performance</button>
          <!-- Triggers collector fetch-latency tracking with a large public image. -->
          <button id="fetch10MbBtn">Fetch 12 MB image</button>
          <button id="fetch20MbBtn">Fetch 21 MB image</button>
          <!-- Smoke tests the backend error endpoint without going through collector.js. -->
          <button id="directErrorBtn">Direct error POST</button>
          <!-- Smoke tests the backend performance endpoint without going through collector.js. -->
          <button id="directPerformanceBtn">Direct performance POST</button>
          <button id="reloadBtn" class="danger">Reload page</button>
        </div>
      </div>

      <div class="log-toolbar">
        <h2>Network Log</h2>
        <button id="copyBtn">Copy log</button>
      </div>
      <ol id="log"></ol>
    </section>
  </main>

  <script>
    const WATCHTOWER_API_KEY_STORAGE_KEY = "watchtower_api_key";
    const WATCHTOWER_COLLECTOR_LOADED_KEY = "watchtower_collector_loaded";

    const LARGE_IMAGE_TARGETS = {
      image12Mb: {
        label: "12 MB Wikimedia image",
        url: "https://upload.wikimedia.org/wikipedia/commons/d/d3/Be%C5%9Fikta%C5%9F_MB_vs_Mersin_SK_TBSL_20241102_%2814%29.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original",
      },
      image21Mb: {
        label: "21 MB Wikimedia image",
        url: "https://upload.wikimedia.org/wikipedia/commons/0/0e/Fenerbah%C3%A7e_Basketbol_vs_Galatasaray_MB_TBSL_20250517_%2814%29.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original",
      },
    };

    const elements = {
      apiKeyInput: document.getElementById("apiKeyInput"),
      initBtn: document.getElementById("initBtn"),
      collectorStatus: document.getElementById("collectorStatus"),
      log: document.getElementById("log"),
    };

    hydrateApiKeyInput();
    persistApiKey();

    if (localStorage.getItem(WATCHTOWER_COLLECTOR_LOADED_KEY) === "true") {
      initCollector();
    } else {
      log("info", "Ready. Enter your API key and click Load script tag.");
    }

    elements.apiKeyInput.addEventListener("input", persistApiKey);

    elements.initBtn.addEventListener("click", initCollector);

    document.getElementById("performanceBtn").addEventListener("click", () => {
      log("info", "Page performance is sent automatically when the collector script loads. Reload the page and click Load script tag again to retest.");
    });

    document.getElementById("manualErrorBtn").addEventListener("click", () => {
      setTimeout(() => {
        throw new Error("Manual WatchTower collector test error");
      }, 0);
    });

    document.getElementById("runtimeErrorBtn").addEventListener("click", () => {
      setTimeout(() => {
        throw new TypeError("Runtime WatchTower collector test error");
      }, 0);
    });

    document.getElementById("promiseBtn").addEventListener("click", () => {
      Promise.reject(new ReferenceError("Unhandled WatchTower collector test rejection"));
    });

    document.getElementById("fetch10MbBtn").addEventListener("click", () => fetchLargeImage(LARGE_IMAGE_TARGETS.image12Mb));
    document.getElementById("fetch20MbBtn").addEventListener("click", () => fetchLargeImage(LARGE_IMAGE_TARGETS.image21Mb));

    document.getElementById("directErrorBtn").addEventListener("click", () => {
      const apiKey = getApiKey();
      if (!apiKey) return;

      postDirectEvent("http://localhost:3000/api/events/error", {
        type: "error",
        apiKey,
        message: "Direct tester error endpoint smoke test",
        stack: "Generated by WatchTower tester index.html",
        url: window.location.href,
        errorType: "TesterError",
        severity: "low",
        release: "1.0.0",
        timestamp: new Date().toISOString(),
      });
    });

    document.getElementById("directPerformanceBtn").addEventListener("click", () => {
      const apiKey = getApiKey();
      if (!apiKey) return;

      postDirectEvent("http://localhost:3000/api/events/performance", {
        type: "performance",
        apiKey,
        url: window.location.href,
        loadTimeMs: 1,
        domContentLoadedMs: 1,
        ttfbMs: 1,
        apiEndpoint: LARGE_IMAGE_TARGETS.image12Mb.url,
        apiLatencyMs: 1,
        memoryMB: null,
        release: "1.0.0",
        timestamp: new Date().toISOString(),
      });
    });

    document.getElementById("copyBtn").addEventListener("click", copyLog);

    document.getElementById("reloadBtn").addEventListener("click", () => window.location.reload());

    async function initCollector() {
      const existing = document.getElementById("collector-script");

      if (existing) {
        existing.remove();
        localStorage.removeItem(WATCHTOWER_COLLECTOR_LOADED_KEY);
        elements.initBtn.textContent = "Load script tag";
        elements.initBtn.classList.remove("danger");
        setCollectorStatus("Collector not initialized", "");
        log("warn", "Collector script tag removed.");
        return;
      }

      const apiKey = getApiKey();
      if (!apiKey) return;

      elements.initBtn.disabled = true;
      elements.initBtn.textContent = "Loading script tag";

      try {
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.id = "collector-script";
          script.src = "./collector.js";
          script.dataset.apikey = apiKey;
          script.dataset.release = "1.0.0";
          script.onload = resolve;
          script.onerror = () => reject(new Error("collector.js failed to load. Confirm the file is available at /collector.js."));
          document.body.appendChild(script);
        });

        localStorage.setItem(WATCHTOWER_COLLECTOR_LOADED_KEY, "true");
        elements.initBtn.disabled = false;
        elements.initBtn.textContent = "Remove script";
        elements.initBtn.classList.add("danger");
        setCollectorStatus("Collector ready", "ready");
        log("success", "Collector script tag loaded with release 1.0.0.");
      } catch (error) {
        elements.initBtn.disabled = false;
        elements.initBtn.textContent = "Load script tag";
        log("error", error.message);
      }
    }

    async function postDirectEvent(path, payload) {
      try {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const body = await response.text();
        log(response.ok ? "success" : "error", `POST ${path} → ${response.status} ${response.statusText || ""}\n${body || "(empty response body)"}`);
      } catch (error) {
        log("error", `POST ${path} failed: ${error.message}`);
      }
    }

    async function fetchLargeImage(target) {
      try {
        await fetch(withCacheBuster(target.url), { mode: "cors" });
      } catch {}
    }

    async function copyLog() {
      const text = Array.from(elements.log.children).map((item) => item.textContent).join("\n\n");
      try {
        await navigator.clipboard.writeText(text);
        log("success", "Log copied to clipboard.");
      } catch (error) {
        log("error", `Could not copy log: ${error.message}`);
      }
    }

    function getApiKey() {
      const apiKey = elements.apiKeyInput.value.trim();
      if (!apiKey) {
        log("error", "Enter an API key before running this test.");
        elements.apiKeyInput.focus();
      }
      return apiKey;
    }

    function hydrateApiKeyInput() {
      try {
        elements.apiKeyInput.value = localStorage.getItem(WATCHTOWER_API_KEY_STORAGE_KEY) || "";
      } catch {}
    }

    function persistApiKey() {
      try {
        localStorage.setItem(WATCHTOWER_API_KEY_STORAGE_KEY, elements.apiKeyInput.value.trim());
      } catch {}
    }

    function setCollectorStatus(message, mode) {
      elements.collectorStatus.classList.toggle("ready", mode === "ready");
      elements.collectorStatus.querySelector("span:last-child").textContent = message;
    }

    function log(level, message) {
      const entry = document.createElement("li");
      entry.className = `log-entry ${level}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      elements.log.prepend(entry);
    }

    function withCacheBuster(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}watchtowerTest=${Date.now()}`;
    }
  </script>
</body>
</html>
